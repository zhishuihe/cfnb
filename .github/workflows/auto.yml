name: Cloudflare IP 优选工具

on:
  workflow_dispatch: # 允许你手动点击运行
  schedule:
    - cron: '0 22 * * *' # 每天早上 6 点自动运行一次（UTC 22点）

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: 注入 Secrets 密钥到配置文件
        run: |
          # 自动把 GitHub 保险箱里的 4 个密钥动态替换进 config.json
          sed -i 's/CF_API_TOKEN_PLACEHOLDER/${{ secrets.CF_API_TOKEN }}/g' config.json
          sed -i 's/CF_ZONE_ID_PLACEHOLDER/${{ secrets.CF_ZONE_ID }}/g' config.json
          sed -i 's/WXPUSHER_APP_TOKEN_PLACEHOLDER/${{ secrets.WXPUSHER_APP_TOKEN }}/g' config.json
          sed -i 's/WXPUSHER_UIDS_PLACEHOLDER/${{ secrets.WXPUSHER_UIDS }}/g' config.json

      - name: 执行优选与测速
        run: |
          python main.py

      - name: 同步更新后的 ip.txt 到仓库 (可选)
        run: |
          # 运行完后如果生成了新的 ip.txt，可以把它顺便提交回仓库保存
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add ip.txt || true
          git commit -m "📊 自动更新优选IP列表 [$(date)]" || true
          git push || true
